services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shipay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shipay"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 10s
    logging:
      driver: none

  db-test:
    image: postgres:16-alpine
    profiles: [test]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shipay_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shipay_test"]
      interval: 2s
      timeout: 5s
      retries: 20
      start_period: 10s

  api:
    build: ./api
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/shipay
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn src.main:app --host 0.0.0.0 --port 8000"

  test:
    build: ./api
    profiles: [test]
    environment:
      TEST_DATABASE_URL: postgresql+psycopg2://postgres:postgres@db-test:5432/shipay_test
    depends_on:
      db-test:
        condition: service_healthy
    command: pytest -v

volumes:
  pgdata:
